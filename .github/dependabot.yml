version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        patterns:
          - "*"
        update-types:
          - "major"

  # Python — root workspace
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # Python — libs
  - package-ecosystem: "uv"
    directory: "libs/langchain-mongodb"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "libs/langgraph-checkpoint-mongodb"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "libs/langgraph-store-mongodb"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"
